body:
  text: 不空三藏譯若有修習此陀羅尼求成就者先須澡浴應着淨衣嚴飾道場安置本尊隨力所辨其道場法應擇勝地作四肘壇堀深三肘除去瓦礫惡土髮毛及骨灰炭蟲蟻等以好淨土填滿築平堀無惡土即取舊填土若有賸當知其地是大吉祥速疾成就取未到地瞿摩夷以香水和淨好土為埿誦無能勝菩薩真言加持二十一遍然後埿壇埿已後取五淨相和五淨者瞿摩夷汁牛尿酪乳蘇以無能勝菩薩真言加持一百八遍右繞遍塗其壇若於山石上建立或在樓閣或居船上一切賢聖得道處但以五淨塗拭面向東坐結無能勝印按地誦真言七遍加持壇中心又取諸藥七寶并五穀各少分堀壇中心深一肘安諸藥及七寶復取舊土填滿平治以右手按誦地天偈三遍驚覺地天神偈曰汝天親護者於諸佛導師修行殊勝行淨地波羅蜜如破魔軍眾釋師子救世我亦降伏魔我畵曼荼羅誦地天真言曰曩莫三漫多沒駄引南引畢哩二合體佗以反微曳二合娑嚩二合引賀誦偈加持已然後以檀香塗九箇聖位如滿月以新淨供具金銀熟銅商佉貝玉石瓷木等新器盛諸飲食及好香華燈燭閼伽香水隨力所有布列供養若在家出家菩薩求成就者每入道場先應禮佛懺悔隨喜勸請發願已應自誓受菩提心戒真言曰唵冐引地止多母怛跛二合引娜野弭菩提心者離一切我執遠離蘊處界及離能取所取於法平等自心本不生自性空故如過去一切佛菩薩發菩提心我亦如是此名自誓受菩提心戒由誦一遍思惟勝義諦獲得無量無邊無為功德莊嚴三業乃至菩提道場其福無間斷速滅一切業障真言速得成就本尊現前如華嚴入法界品慈氏菩薩為善財童子說菩提心功德自誓菩提心戒已全跏半跏隨意而坐端身閇目即結定印想空中准提佛母與七俱胝佛圍繞遍滿虗空定中禮一切諸佛及准提佛母然後以香塗手應結契印佛部三麼耶印二手虗心合掌開二頭指屈輔二中指甲下第一節側二大指各附二頭指根下即成當心誦真言七遍想於如來三十二相八十種好分明如對目前真言曰唵怛他引蘖覩納婆二合嚩引野娑嚩二合賀引由結此印誦真言故即驚覺一切如來悉當護念加持行者以光明照觸所有罪障皆得消滅壽命長遠福慧增長佛部聖眾擁護歡喜生生世世離諸惡趣蓮華化生速證無上正等菩提蓮華部三麼耶印以二手虗心合掌散開二頭指二中指二無名指屈如蓮華形安印當心誦真言七遍想觀自在菩薩相好具足於頂右散真言曰唵跛娜謨二合引納婆二合嚩引野娑嚩二合引賀引由結此印誦真言故即驚覺觀自在菩薩等持蓮華者一切菩薩光明照觸所有業障皆悉除滅一切菩薩常為善友金剛部三麼耶印以左手翻向外以右手掌背安左手背以左右大小指共相鉤如金剛杵形安於當心想金剛手菩薩誦真言七遍頂左散印真言曰唵嚩日嚧二合納婆二合嚩引野娑嚩二合引賀引由結此印及誦真言故即驚覺一切金剛聖眾加持擁護所有罪障皆得除滅一切痛苦終不著身當得金剛堅固之體次結第二根本印用護身二手外相叉二頭指二大指並直竪即成誦佛母心真言印身五所所謂額次右肩次左肩次喉頂上散真言曰唵迦麼黎尾麼黎准泥娑嚩二合賀引結護身印時起大慈心遍緣六道四生願一切有情被大誓莊嚴堅固金剛甲冑速證無上正等菩提次結地界橛印二手內相叉竪二大指二頭指二小指各相合屈左頭指如鉤三掣大母指指地即成一掣誦真言一遍真言曰唵准低你枳引邏野娑嚩二合引賀引由結此印誦真言加持地界故下至水際如金剛座天魔及諸障者不為惱害少加功力速得成就持誦者次應於壇中心想八葉大蓮華上有師子座座上有寶樓閣垂諸瓔珞繒幡幢蓋寶柱行列垂妙天衣周迊香雲普雨雜華奏諸音樂寶瓶閼伽天妙飲食摩尼為燈如無曼荼羅但於空中觀想即成就作此觀已應誦此偈以我功德力如來加持力及以法界力普供養而住誦此偈已即誦大虗空藏菩薩真言曰唵誐誐曩三婆嚩嚩日羅二合斛引由誦此真言加持故所想供養具真實無異一切聖眾皆得受用次結寶車輅印二手內相叉仰掌二頭指橫相跓以二大指各捻頭指根下想七寶車輅佛部使者駕御七寶車輅乘空而去至於色界頂阿迦尼吒天毗盧遮那佛宮殿中誦真言七遍真言曰唵都嚕都嚕吽引由誦真言結印加持七寶車輅至色界頂准提佛母并八大菩薩及諸聖眾眷屬圍繞乘七寶車輅次結請車輅印准前印以大指向身撥中指即成誦真言七遍真言曰曩麼悉底哩二合野地尾二合迦引南引一怛他引蘖多南唵嚩日朗二合擬研以反你娘二合引羯哩灑二合也娑嚩二合引賀引由誦真言加持故聖眾從本土來至道場空中而住次結請本尊印從車輅下降於道場准前第一根本印以二大指向身招誦真言三遍真言曰唵者禮主禮准泥翳醯曳二合呬婆誐嚩底丁以反娑嚩二合引賀引次結無能勝菩薩印辟除障者二手右押左內相叉作拳竪二中指頭相合即成遶身左旋三迊作是思惟所有障者毗那夜迦諸惡鬼神遠走而去所來聖眾不越本三麼耶大悲而住願垂加護曩莫三滿多沒駄引南引唵戶嚕戶嚕戰拏引里麼引蹬耆娑嚩二合引賀引次結牆界印准前地界印屈右頭指展左頭指右旋三迊隨心近遠即成金剛堅固之城諸佛菩薩尚不違越何況諸餘難調伏者毗那夜迦及毒蟲利牙爪者不能輔近真言曰唵准你𩕳鉢囉二合迦羅耶娑嚩賀次結上方網界印准前牆印展右左頭指右押左當中節相交即成誦此真言三遍真言曰唵准泥𩕳半惹囉娑嚩賀由誦真言結印加持故即成金剛堅固不壞之網次結火院密縫印以左手掩右手背相重直竪二大指即成誦真言三遍右旋三迊想金剛墻外有金剛火焰圍繞真言曰唵阿三莾擬伽以反你吽引發吒半音由結此印誦真言成大結護密縫不被諸魔入次結閼伽印二手內相叉竪二中指頭相著以二頭指捻二中指背二大指側附二頭指根下即成根本印准前根本印微屈二大指入掌即成閼伽印誦真言三遍真言曰唵者禮主禮准泥遏鉗鉢羅二合底引瑳婆誐嚩底丁以反娑嚩二合引賀引行者思惟聖眾了了分明想自身在諸佛聖眾足下手持七寶閼伽器盛香水浴聖眾足由獻閼伽香水故行者三業清淨洗滌煩惱垢業障消滅次結蓮華部印准前根本印並二大指向身竪運想從此印流出無量師子座奉獻一切聖眾是諸聖眾各各皆坐真言曰唵迦麼邏娑嚩二合引賀引由結座印誦真言奉獻聖眾故行者當得十地滿足得金剛之座次結澡浴印准前根本印以二大母指頭捻二中指中節即成誦真言三遍真言曰唵者娑嚩二合引賀引想從此印流出無量光明一一光明道有無量七寶賢瓶想滿天妙香水灌注一切聖眾澡浴復想空中有無量天樂供養本尊諸佛菩薩一切聖眾由結此印誦真言故行者不久當得法雲地次結塗香印准前根本印以二大指博著右頭指下節側成誦真言三遍真言曰唵禮娑嚩二合引賀引想從此印流出無量光明一一光明道有無量天妙塗香粖香雲海供養本尊諸佛菩薩一切聖眾由結此印誦真言故當證一切如來戒定慧解脫解脫知見香次結華印准前根本印以二大指博著左頭指下節即成誦真言三遍真言曰唵主娑嚩二合引賀引想從此印流出無量光明一一光明道有無量種種水陸天妙華雲海供養本尊諸佛菩薩一切聖眾由結此印誦真言故當得大慈三摩地成就能利樂無邊眾生諸灾難不著身次結燒香印准前根本印屈右頭指捻二大指頭成誦真言三遍真言曰唵禮娑嚩二合引賀引想從此印流出無量光明一一光明道有無量和合俱生天妙燒香雲海供養本尊諸佛菩薩一切聖眾由結此印誦真言故當得普遍法界三摩地成就次結飲食印准前根本印以左頭指捻二大指頭即成誦真言三遍真言曰唵准娑嚩二合引賀想從此印流出無量光明一一光明道有無量天妙種種飲食雲海供養本尊諸佛菩薩一切飲食雲海聖眾當得法喜禪悅食三解脫最勝味三摩地成就次結燈印准前根本印以二頭指各捻二大指頭即成誦真言三遍真言曰唵泥娑嚩二合引賀引想從此印流出無量光明一一光明道有無量種種七寶燈燭雲海供養本尊諸佛菩薩一切聖眾當得般若波羅蜜光明五眼清淨次誦讚歎阿嚩怛羅左覩囉娜二合舍引囉駄二合娑麼二合羅哩補句致鉢羅二合拏麼跛娜尾呬帝阿者禮怛𪘨娑哩素你祖禮悉𠆙思准泥薩囉二合悶底南引婆嚩捨麼你娑嚩二合引罕引帝薩鉢囉二合拏吠怛你也二合佗引託灑二合羅引拏薩帝阿尾你多薩怛嚩二合娜麼你鉢囉二合枲引那路引迦怛囉二合野引囉他二合迦唎訖多二合囉尾孕二合那戍引鼻你播引怛囉二合迦羅那訖使二合𩕳娑普二合砧底浪反悉體二合怛嚩二合進底多麼囉貪二合去鉢囉二合瑟砧二合李佉惹曩你爾慈心反下同娜引你薩帝知曳反曩鉢囉二合庫舞二合地曬邏始佉黎野薩怛梵二合引怛囉抳焰二合悉閇怛母二合你你哥反嚩日哩二合擔枳羅駄彌焰二合素囉哩補婆嚩南鉢囉二合吠奢野悉底阿引哩野二合嚩路引枳帝皤悉𠆙底諾僧捨閻薩怛多惹播引多半音多諾反且曩引悉底二合惹蘖底緊旨你也二合薩怛梵三合引曩那娜引悉薄羯底二合毗藥二合𪾼底娑迦羅播引跛曩引舍你婆誐嚩底跛耻多麼引怛囉二合悉地迦里布囉野麼努引囉貪枲冥引娜底曩怛梵二合引娑底二合囕迦室子二合多半音婆誐嚩底佛母准泥陀羅尼薩妬二合怛囉薩麼跛多二合次說本尊陀羅尼布字法從頂至足觀一一真言字屈曲分明流出光明照六道四生輪迴有情深起悲愍施與安樂用陀羅尼九字布列於行者身即成以如來印八大菩薩所加持身若作息災增益降伏敬愛隨四種法所謂白黃黑赤成辨悉地即結布字印二手內相叉二大指二頭指二小指相合直豎即成想唵字安於頂以大母指觸頭上次想左字兩目童人上俱想禮字復以大母觸左右眼上次想祖字安於頸上用大母指觸次想禮字當心以大母指觸次想准字安左右肩以大母指觸次想泥字安臍上以大母指觸次想娑嚩二合字安左右兩䏶上以小指觸次想訶字安左右兩胵上以小指觸由想布真言結印加持故行者身即成准泥佛母身滅除一切業障積集無量福德吉祥其身成金剛不壞體若能常專注觀行一切悉地皆得現前速證無上正等菩提次結根本印誦根本真言七遍頂上散印即取菩提子念珠具一百八依法貫穿即以塗香塗其珠上以二手掌中捧珠當心誦真言七遍加持念珠真言曰唵吠嚧引遮那引麼羅娑嚩二合引賀加持頂戴心口作是願言我今欲念誦唯願本尊諸佛菩薩加持護念願令速得隨意所求悉地圓滿然後以左手無名指大指承珠右手以大指無名指移珠手如說法相於心前持珠念誦其聲不緩不急心專注不異緣觀自身同本尊身相好具足又於身前壇中觀想七俱知佛母與眷屬圍繞了了分明對坐每稱娑嚩二合引賀字同時移一珠一百八或一千八十為念誦遍數常須限定若不足一百八即不充求悉地遍數念誦畢已蟠珠於掌中頂戴發願作是願言以我念誦功德一切眾生所修真行求上中下悉地速得成就安珠於篋中即結定印端身閇目澄心淨意於胸臆身內炳現圓明如滿月皎潔光明起大精進決定取證若能不懈怠專功必當得見本源清淨之心於圓明中想唵字餘八字右旋於圓明上布列於定中須見真言字分明既不散動得定即與般若波羅蜜相應即畫圓明月輪次應思惟字母種子義唵字者是三身義亦是一切法本不生義左字者一切法不生不滅義禮字者一切法相無所得義祖字者一切法無生滅義禮字者一切法無垢義准字者一切法無等覺義泥字者一切法無取捨義娑嚩二合字者一切法平等無言說義訶字有一切法無因義由一切法本不生故即得不生滅由不生不滅故即得相無所得由相無所得故即得無生滅由無生滅故即得無垢由無垢故即得無等覺由無等覺故即得無取捨由無取捨故得平等無言說由平等無言說故即得無因無果般若相應無所得以為方便入勝義實際則證法界真如以此為三摩地念誦畢已應結根本印次結澡浴印次結五供養印次誦讚歎獻閼伽次結阿三麼擬你二合印左轉一匝解界次結寶車輅印以大母指向外撥中指頭奉送聖者還本宮奉送真言曰唵者禮主禮准泥蘖車蘖車婆誐嚩底娑嚩二合引婆引嚩南布娜羅引誐麼那引野娑嚩二合引賀次結三部三麼耶印各誦真言一遍禮佛如前懺悔隨喜勸請發願迴向無上菩提隨意經行轉讀大乘經典華嚴大般若等經印塔像浴舍利右旋繞思六念以此福聚迴向自所求悉地次說息灾增益敬愛調伏四種法扇底迦法者求滅罪轉障除灾害鬼魅疾病因閇枷鏁疫病國難水旱不調蟲損苗稼五星陵逼本命悉皆除滅煩惱解脫是名息灾法作此法時著白衣面向北交胵竪膝吉祥坐觀本尊白色供養飲食菓子香華燈燭地等悉皆白色從月一日至八日日三時念誦夜作護摩息灾真言曰唵者禮主禮准泥令某甲為他人念誦稱彼名扇引底矩嚕二合引娑嚩二合引賀布瑟置二合迦法者求延命官榮伏藏富饒聰慧聞持不忘藥法成就金剛杵等成就或作師子象馬類以真言加持三相現隨上中下所求獲果如蘇悉地廣說欲求明仙入阿蘇羅窟及諸八部鬼神窟求入者皆得及證地位神通求二種資粮圓滿速成無上菩提是名增益法作此法時身著黃衣面向東結跏趺坐觀本尊黃色所供養香華飲食菓子燈燭地等並皆黃色從月八日至十五日日三時念誦夜作護摩真言曰唵者禮主禮准泥令某甲布瑟徵二合矩嚕二合娑嚩二合賀引伐施迦羅拏法者若欲令一切人見者發歡喜心攝伏鉤召若男若女天龍八部夜叉女及攝伏難調伏鬼神有諸怨敵作不饒益事皆令迴心歡喜諸佛護念加持是名攝召敬愛法作此法者身著赤衣面向西竪二膝並脚名為賢坐觀本尊及所供養香華飲食菓子燈燭地等並皆赤色從十六日至二十三日日三時念誦夜作護摩攝召真言曰唵者禮主禮夜准泥令某甲嚩試矩嚕二合娑嚩二合引賀阿毗遮嚕迦法者犯五無間謗方廣大乘毀滅佛性皆逆君主或亂正法於如是之人深起悲愍應作降伏法以驢糞或燒尸灰以用塗壇作此法時身著黑衣或青衣面向南左脚押右脚蹲踞坐觀本尊黑色取臭無香氣黑色或青色華供養所供養飲食香華菓子等燈燭地等並皆黑色或青色從月二十三日至月盡日取午時中夜二時念誦夜作護摩真言曰唵者禮主禮准泥令某甲鉢囉二合喃伽多野吽發吒次說准泥佛母畫像法取不截白㲲去毛髮者於淨壁先應塗壇以閼伽飲食隨力供養畫師應受八戒齋清淨畫像其粉色中勿用皮膠於新器中調色應畫准提佛母像身黃白色結跏趺坐坐蓮華上身佩圓光著輕縠如十波羅蜜菩薩衣上下皆作白色復有天衣角絡瓔珞頭冠臂皆著螺釧檀慧著寶環其像面有三目十八臂上二手作說法相右第二手作施無畏第三手執釰第四手持寶鬘第五手持掌俱緣菓第六手持鉞斧第七手執鉤第八手執金剛杵第九手持念珠左第二手執如意寶幢第三手持開敷紅蓮華第四手軍持第五手羂索第六手持輪第七手商佉第八手賢瓶第九手掌般若梵夾蓮華下畫水池池中難陀龍王塢婆難陀龍王柘蓮華座左邊畫持誦者執香爐瞻仰聖者准提佛母衿愍持誦人眼下顧視上畫二淨居天子一名俱素陀天子手持華鬘向下承空而來供養聖者畫像已隨力僧次請七七僧供養請開光明呪願讚歎於像下應書法身緣起偈將像於精室祕密供養以帛覆像念誦去覆帛瞻禮供養念誦畢都以帛覆慎勿令人見何以故從師受儀軌畫像法若轉與人畫像從魔得便當須祕密仁平二年九月二十七日未時寫了覺永
